<title>The Synaptic Web — Full System (Cam Stack)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  svg { max-width: 100vw; max-height: 100vh; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  @keyframes flow { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }
  @keyframes flowBack { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 40; } }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  @keyframes shimmer { 0%,100% { opacity: 0.2; cy: 0; } 25% { opacity: 0.9; } 50% { opacity: 0.3; cy: 3; } 75% { opacity: 0.7; } }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes irisOpen { 0%,80% { r: 3; opacity: 0.3; } 90% { r: 10; opacity: 1; } 100% { r: 3; opacity: 0.3; } }
  @keyframes hoperman { 0%,100% { transform: scale(0.7); } 50% { transform: scale(1.1); } }
  @keyframes snapUp { 0%,45% { transform: rotate(8deg); } 50%,95% { transform: rotate(-8deg); } }
  @keyframes fallBall { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(55px); opacity:0; } }
  @keyframes followerBob { 0%,100% { transform: translateX(0); } 30% { transform: translateX(8px); } 60% { transform: translateX(-5px); } }
  @keyframes chimeRing { 0%,90%,100% { r: 16; opacity: 0.6; } 93% { r: 16; opacity: 1; } 95% { r: 22; opacity: 0.8; } 97% { r: 28; opacity: 0.4; } }

  .sig-fwd { stroke-dasharray: 8 12; animation: flow 2s linear infinite; }
  .sig-back { stroke-dasharray: 6 10; animation: flowBack 2.5s linear infinite; }
  .pulse { animation: pulse 3s ease-in-out infinite; }
  .breathe { animation: breathe 4s ease-in-out infinite; }
  .bob { animation: bob 3s ease-in-out infinite; }
  .cam-spin { animation: spinSlow 8s linear infinite; transform-origin: center; }
  .cam-spin-2 { animation: spinSlow 8s linear infinite; animation-delay: -1s; transform-origin: center; }
  .cam-spin-3 { animation: spinSlow 8s linear infinite; animation-delay: -2s; transform-origin: center; }
  .hoberman { animation: hoperman 5s ease-in-out infinite; transform-origin: center; }
  .snap-flexure { animation: snapUp 2s ease-in-out infinite; transform-origin: center; }
  .iris-pulse { animation: irisOpen 12s ease-in-out infinite; }
  .follower-move { animation: followerBob 4s ease-in-out infinite; }
  .follower-move-2 { animation: followerBob 4s ease-in-out infinite; animation-delay: -1.3s; }
  .follower-move-3 { animation: followerBob 4s ease-in-out infinite; animation-delay: -2.6s; }
  .ball-fall { animation: fallBall 3s linear infinite; }
  .ball-fall-2 { animation: fallBall 3s linear infinite; animation-delay: -1s; }
  .ball-fall-3 { animation: fallBall 3s linear infinite; animation-delay: -2s; }
  .chime-ring { animation: chimeRing 10s ease-in-out infinite; }
</style>
