<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical Transformer — 2D Mechanical Power Transfer Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  overflow-x: auto;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 30px 20px 15px;
  border-bottom: 1px solid #1a1a2e;
}
.header h1 {
  font-size: 2em;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #c9a84c;
  text-transform: uppercase;
}
.header .sub {
  font-size: 0.95em;
  color: #888;
  margin-top: 6px;
}

/* ── Controls ── */
.controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 16px;
  flex-wrap: wrap;
  border-bottom: 1px solid #1a1a2e;
}
.controls button {
  background: #111;
  border: 1px solid #333;
  color: #aaa;
  padding: 8px 18px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
}
.controls button:hover { border-color: #c9a84c; color: #c9a84c; }
.controls button.active { background: rgba(201,168,76,0.15); border-color: #c9a84c; color: #c9a84c; font-weight: 600; }

/* ── Tick indicator ── */
.tick-bar {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 12px;
  background: #0d0d14;
}
.tick-bar .tick {
  width: 50px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #222;
  border-radius: 3px;
  font-size: 0.75em;
  color: #555;
  transition: all 0.3s;
}
.tick-bar .tick.active { background: rgba(201,168,76,0.2); border-color: #c9a84c; color: #c9a84c; font-weight: 700; }
.tick-bar .tick.forward { border-left: 3px solid #4a9eff; }
.tick-bar .tick.adjoint { border-left: 3px solid #ff6b6b; }
.tick-bar .tick.predict { border-left: 3px solid #50c878; }

/* ── Legend ── */
.legend {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 10px;
  font-size: 0.8em;
  color: #888;
}
.legend span { display: flex; align-items: center; gap: 6px; }
.legend .dot { width: 10px; height: 10px; border-radius: 50%; }

/* ── SVG container ── */
.diagram-container {
  width: 100%;
  overflow-x: auto;
  padding: 20px;
}
svg text { font-family: 'Segoe UI', system-ui, sans-serif; }

/* ── Info panel ── */
.info-panel {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 30px 40px;
}
.info-panel h2 {
  font-size: 1.3em;
  font-weight: 300;
  color: #c9a84c;
  letter-spacing: 0.08em;
  margin: 20px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid #1a1a2e;
}
.info-panel table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85em;
  margin: 10px 0;
}
.info-panel th, .info-panel td {
  padding: 6px 12px;
  border: 1px solid #1a1a2e;
  text-align: left;
}
.info-panel th { background: #111; color: #c9a84c; font-weight: 500; }
.info-panel td { color: #ccc; }
.info-panel .chain {
  background: #0d0d14;
  border: 1px solid #1a1a2e;
  border-radius: 6px;
  padding: 14px 18px;
  margin: 10px 0;
  font-size: 0.9em;
  line-height: 1.8;
}
.info-panel .chain .arrow { color: #c9a84c; margin: 0 4px; }
.info-panel .chain .comp { color: #4a9eff; font-weight: 500; }
.info-panel .chain .comp.adjoint-comp { color: #ff6b6b; }
.info-panel .chain .comp.converge-comp { color: #50c878; }
.info-panel .chain .mech { color: #888; font-size: 0.85em; }

/* ── Flow anim ── */
@keyframes flowRight {
  0% { stroke-dashoffset: 20; }
  100% { stroke-dashoffset: 0; }
}
@keyframes flowLeft {
  0% { stroke-dashoffset: -20; }
  100% { stroke-dashoffset: 0; }
}
.flow-right {
  stroke-dasharray: 8 4;
  animation: flowRight 0.8s linear infinite;
}
.flow-left {
  stroke-dasharray: 8 4;
  animation: flowLeft 0.8s linear infinite;
}

/* tooltip */
.tooltip {
  position: fixed;
  background: #1a1a2e;
  border: 1px solid #c9a84c;
  color: #e0e0e0;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 0.82em;
  max-width: 320px;
  pointer-events: none;
  z-index: 100;
  display: none;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="header">
  <h1>Mechanical Power Transfer Map</h1>
  <div class="sub">The Physical Transformer — Every energy path from NEMA 23 to output, tick by tick</div>
</div>

<div class="controls">
  <button class="active" onclick="setView('power')">Power Distribution</button>
  <button onclick="setView('forward')">Forward Pass (Ticks 1-8)</button>

  <button onclick="setView('converge')">Convergence Detection</button>
  <button onclick="setView('all')">All Paths</button>
</div>

<div class="tick-bar" id="tickBar"></div>

<div class="legend">
  <span><span class="dot" style="background:#c9a84c"></span> Motor power</span>
  <span><span class="dot" style="background:#4a9eff"></span> Forward signal</span>
  <span><span class="dot" style="background:#ff6b6b"></span> Adjoint signal</span>

<div class="diagram-container">

</div>

<div class="info-panel" id="infoPanel"></div>

<div class="tooltip" id="tooltip"></div>

const connections = [
  // ── Motor power distribution ──

// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════

let currentView = 'power';
let currentTick = 0;
const svg = document.getElementById('mainDiagram');
const tooltip = document.getElementById('tooltip');

function setView(view) {
  currentView = view;
  currentTick = 0;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
  renderTickBar();
  renderInfoPanel();
}

function renderTickBar() {
  const bar = document.getElementById('tickBar');
  let html = '';
  const ticks = currentView === 'predict' ? 10 : 13;
  for (let i = 1; i <= ticks; i++) {
    let cls = 'tick';
    if (currentView === 'forward' && i <= 8) cls += ' forward';
    else if (currentView === 'forward' && i > 8) cls += '';
    else if (currentView === 'adjoint' && i >= 9) cls += ' adjoint';
    else if (currentView === 'adjoint' && i < 9) cls += '';
    else if (currentView === 'predict') cls += ' predict';
    else if (currentView === 'converge') cls += i >= 9 ? ' adjoint' : '';
    else {
      if (i <= 8) cls += ' forward';
      else cls += ' adjoint';
    }
    html += `<div class="${cls}" onclick="setTick(${i})" style="cursor:pointer">${i}</div>`;
  }
  bar.innerHTML = html;
}

function setTick(t) {
  currentTick = currentTick === t ? 0 : t;
  render();
  // highlight tick
  document.querySelectorAll('.tick-bar .tick').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === currentTick);
  });
}

function isConnectionVisible(conn) {
  if (currentView === 'all') return true;
  if (currentView === 'power') return conn.type === 'power';
  if (currentView === 'forward') return conn.type === 'forward' || conn.type === 'power';
  if (currentView === 'adjoint') return conn.type === 'adjoint' || conn.type === 'power';
  if (currentView === 'predict') return conn.type === 'predict' || conn.type === 'forward' || conn.type === 'power';
  if (currentView === 'converge') return conn.type === 'converge' || conn.type === 'adjoint';
  return true;
}

function isComponentVisible(comp) {
  if (currentView === 'all' || currentView === 'power') return true;
  // Check if any visible connection touches this component
  return connections.some(c =>
    isConnectionVisible(c) && (c.from === comp.id || c.to === comp.id)
  );
}

function getConnectionColor(type) {
  switch(type) {
    case 'power': return COLORS.motor;
    case 'forward': return COLORS.forward;
    case 'adjoint': return COLORS.adjoint;
    case 'predict': return COLORS.converge;
    case 'converge': return COLORS.converge;
    default: return COLORS.mech;
  }
}

function render() {
  let s = '';

  // Background grid
  s += `<defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#111" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowForward" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="${COLORS.forward}" />
    </marker>
    <marker id="arrowAdjoint" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="${COLORS.adjoint}" />
    </marker>
    <marker id="arrowPower" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="${COLORS.motor}" />
    </marker>
    <marker id="arrowPredict" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="${COLORS.converge}" />
    </marker>
    <marker id="arrowConverge" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="${COLORS.converge}" />
    </marker>
  </defs>`;
  s += `<rect width="1400" height="1100" fill="url(#grid)" />`;

  // Face zone labels
  const zones = [
    { label: 'BACK FACE', x: 60, y: 800, w: 280, h: 30 },
    { label: 'LEFT FACE (I/O)', x: 350, y: 140, w: 170, h: 30 },
    { label: 'FRONT FACE (Triptych)', x: 500, y: 60, w: 280, h: 30 },
    { label: 'RIGHT FACE (Compute)', x: 630, y: 220, w: 220, h: 30 },
    { label: 'BOTTOM (Loss)', x: 1050, y: 780, w: 200, h: 30 },
    { label: 'CONVERGENCE', x: 1230, y: 460, w: 160, h: 30 },
  ];
  zones.forEach(z => {
    s += `<text x="${z.x}" y="${z.y}" fill="#333" font-size="11" font-weight="600" letter-spacing="0.1em">${z.label}</text>`;
  });

  // Draw connections (behind components)
  connections.forEach(conn => {
    if (!isConnectionVisible(conn)) return;
    const from = components[conn.from];
    const to = components[conn.to];
    if (!from || !to) return;

    const x1 = from.x + from.w / 2;
    const y1 = from.y + from.h / 2;
    const x2 = to.x + to.w / 2;
    const y2 = to.y + to.h / 2;

    const color = getConnectionColor(conn.type);
    const opacity = currentTick === 0 ? 0.6 : 0.2;
    const markerId = `arrow${conn.type.charAt(0).toUpperCase() + conn.type.slice(1)}`;
    const flowClass = conn.type === 'adjoint' ? 'flow-left' : 'flow-right';

    // Smart path: prefer Manhattan routing
    const dx = x2 - x1;
    const dy = y2 - y1;
    let path;
    if (Math.abs(dx) > Math.abs(dy) * 2) {
      // mostly horizontal
      const mx = x1 + dx * 0.5;
      path = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    } else if (Math.abs(dy) > Math.abs(dx) * 2) {
      // mostly vertical
      const my = y1 + dy * 0.5;
      path = `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
    } else {
      path = `M${x1},${y1} Q${x1 + dx*0.3},${y1} ${x1 + dx*0.5},${y1 + dy*0.5} T${x2},${y2}`;
    }

    s += `<path d="${path}" fill="none" stroke="${color}" stroke-width="2"
          opacity="${opacity}" marker-end="url(#${markerId})" class="${flowClass}" />`;

    // Connection label at midpoint
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    if (conn.label && opacity > 0.3) {
      s += `<text x="${mx}" y="${my - 6}" fill="${color}" font-size="9" text-anchor="middle" opacity="0.7">${conn.label}</text>`;
    }
  });

  // Draw components
  Object.values(components).forEach(comp => {
    const visible = isComponentVisible(comp);
    const opacity = visible ? 1.0 : 0.15;

    // Determine if active at current tick
    let isActive = currentTick === 0;
    if (currentTick > 0 && comp.ticks) {
      Object.values(comp.ticks).forEach(tArr => {
        if (tArr.includes(currentTick)) isActive = true;
      });
    }
    const fillOpacity = isActive ? 0.25 : 0.08;
    const strokeOpacity = isActive ? 0.9 : 0.3;

    // Component box
    s += `<g opacity="${opacity}" class="comp-group" data-id="${comp.id}"
          onmouseenter="showTooltip(event,'${comp.id}')" onmouseleave="hideTooltip()">`;
    s += `<rect x="${comp.x}" y="${comp.y}" width="${comp.w}" height="${comp.h}"
          rx="4" fill="${comp.color}" fill-opacity="${fillOpacity}"
          stroke="${comp.color}" stroke-width="${isActive ? 2 : 1}" stroke-opacity="${strokeOpacity}" />`;

    // Active glow
    if (isActive && currentTick > 0) {
      s += `<rect x="${comp.x - 2}" y="${comp.y - 2}" width="${comp.w + 4}" height="${comp.h + 4}"
            rx="6" fill="none" stroke="${comp.color}" stroke-width="1" stroke-opacity="0.3" />`;
    }

    // Label
    s += `<text x="${comp.x + comp.w / 2}" y="${comp.y + comp.h / 2 - 4}"
          fill="#eee" font-size="11" font-weight="600" text-anchor="middle">${comp.label}</text>`;
    s += `<text x="${comp.x + comp.w / 2}" y="${comp.y + comp.h / 2 + 10}"
          fill="#999" font-size="9" text-anchor="middle">${comp.sublabel}</text>`;

    // Face badge
    s += `<text x="${comp.x + comp.w - 4}" y="${comp.y + 10}"
          fill="#444" font-size="7" text-anchor="end">${comp.face}</text>`;

    s += `</g>`;
  });

  // Title for current view
  const titles = {
    power: 'MOTOR POWER DISTRIBUTION — NEMA 23 → all mechanisms',
    forward: 'FORWARD PASS — Input → Hidden → Output (Ticks 1-8)',
    adjoint: 'ADJOINT BACKPROPAGATION — Error → Gradients → Weight Update (Ticks 9-13)',
    predict: 'PREDICT MODE — Forward pass → Winner-take-all → Answer (Ticks 1-10)',
    converge: 'CONVERGENCE DETECTION — Error sliders → AND gate → Motor stop',
    all: 'ALL PATHS — Complete mechanical power transfer map',
  };
  s += `<text x="700" y="1060" fill="#c9a84c" font-size="14" font-weight="300"
        text-anchor="middle" letter-spacing="0.08em">${titles[currentView]}</text>`;
  s += `<text x="700" y="1085" fill="#555" font-size="11" text-anchor="middle">
        Click a tick number above to highlight active components at that moment. Click component for details.</text>`;

  svg.innerHTML = s;
}

function showTooltip(e, id) {
  const comp = components[id];
  if (!comp) return;
  tooltip.innerHTML = `<strong style="color:${comp.color}">${comp.label}</strong><br>${comp.detail}`;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 15) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

document.addEventListener('mousemove', e => {
  if (tooltip.style.display === 'block') {
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }
});

  if (currentView === 'predict' || currentView === 'all') {

    <div class="chain">
      <strong>Setup:</strong> Mode lever <span class="arrow">→</span> <span class="comp converge-comp">Dog Clutch</span> <span class="mech">[CLUNK. Whippletree retracts. Comparator engages.]</span><br><br>
      <strong>Ticks 1-8:</strong> Same forward pass as training, but driven by <span class="comp converge-comp">Input Prisms</span> <span class="mech">[user rotates by hand]</span> instead of pin drum.<br>
      Signal: Prisms → One-hot gates → Strings → Pantographs → ReLU → Output pantographs → <span class="comp converge-comp">3 Output Rods</span><br><br>
      <strong>Tick 9:</strong> <span class="comp converge-comp">3 Output Rods</span>
      <span class="arrow">→</span> <span class="comp converge-comp">Comparison Beam</span> <span class="mech">[120mm brass, rests on highest rod]</span>
      <span class="arrow">→</span> <span class="comp converge-comp">Geneva Drive</span> <span class="mech">[3-slot, 120° index, chunk-chunk-chunk]</span><br><br>
      <strong>Tick 10:</strong> <span class="comp converge-comp">Geneva Drive</span>
      <span class="arrow">→</span> <span class="comp converge-comp">Answer Prism</span> <span class="mech">[rotates to show winning word]</span>
    </div>`;
  }

  if (currentView === 'converge' || currentView === 'all') {
    html += `<h2>Convergence Detection Chain</h2>
    <div class="chain">
      <span class="comp converge-comp">3 Error Sliders</span> <span class="mech">[continuously track error magnitude on MGN7 rails]</span><br>
      <span class="arrow">→</span> <span class="comp converge-comp">3 V-Notch Pins</span> <span class="mech">[spring-loaded, 1.5mm dia. 60° V-notch = 2mm wide = 2.5% threshold. Pin drops when slider within notch.]</span><br>
      <span class="arrow">→</span> <span class="comp converge-comp">Trigger Bar</span> <span class="mech">[common bar via short levers. Held UP by ANY undropped pin. When ALL 3 drop: bar FALLS. Mechanical AND gate.]</span><br>
      <span class="arrow">→</span> <span class="comp converge-comp">Rotary Damper</span> <span class="mech">[3-second delay. No fluid. Must sustain "all dropped" for 3s before trip.]</span><br>
      <span class="arrow">→</span> <span class="comp converge-comp">Motor Clutch</span> <span class="mech">[DISENGAGE. Motor spins free. Barrel cam stops. Pendulum decays. Silence.]</span><br>
      <span class="arrow">→</span> <span class="comp converge-comp">Auto-PREDICT Switch</span> <span class="mech">[same clutch shifts dog clutch to PREDICT position. Machine invites interaction.]</span>
    </div>
    <table>
      <tr><th>Parameter</th><th>Value</th><th>Notes</th></tr>
      <tr><td>V-notch width</td><td>2mm</td><td>2.5% of 80mm rail = convergence threshold</td></tr>
      <tr><td>V-notch angle</td><td>60°</td><td>Good centering force</td></tr>
      <tr><td>Pin diameter</td><td>~1.5mm</td><td>Spring-loaded, rides above slider</td></tr>
      <tr><td>Damper delay</td><td>3 seconds</td><td>Prevents false positives from transient oscillations</td></tr>
      <tr><td>Threshold adjustable?</td><td>Yes</td><td>Replaceable V-notch inserts (wider = easier convergence)</td></tr>
    </table>`;
  }

  // Always show the complete E2E summary
  html += `<h2>Complete E2E Power Transfer Summary</h2>
  <table>
    <tr><th>Chain</th><th>Path (component → component)</th><th>Energy Form</th><th>Ticks Active</th></tr>
    <tr><td>Motor → Timing</td><td>NEMA 23 → shaft → barrel cam → pendulum</td><td>Rotational → sequential</td><td>1-13 (continuous)</td></tr>
    <tr><td>Motor → Clamps</td><td>shaft → 2 cam lobes → clamp bar jaws</td><td>Rotational → linear squeeze</td><td>1 (switch), 9 (switch)</td></tr>
    <tr><td>Input encoding</td><td>Pin drum → pin readers → one-hot gates</td><td>Mechanical contact → string clamp</td><td>1</td></tr>
    <tr><td>Forward: weights</td><td>Worm gears → strings → pantographs</td><td>Angular position → linear displacement → summation</td><td>2-4</td></tr>
    <tr><td>Forward: activation</td><td>Pantograph sum → ReLU cam → spring toggle</td><td>Linear → cam profile → bistable snap</td><td>5</td></tr>
    <tr><td>Forward: output</td><td>ReLU → strings → output pantographs → rods</td><td>Linear → string → summation → linear</td><td>6-8</td></tr>
    <tr><td>Error computation</td><td>Output rods → whippletree → sliders → springs</td><td>Linear → balance → differential → elastic</td><td>9</td></tr>
    <tr><td>Adjoint backward</td><td>Leaf springs → pantographs (backward) → ReLU → pantographs</td><td>Force → reciprocal displacement → chain rule</td><td>10</td></tr>
    <tr><td>Gradient multiply</td><td>Adjoint at weights → spiral cams (stored × adjoint)</td><td>Torque = radius × tension</td><td>11</td></tr>
    <tr><td>Weight update</td><td>Spiral cam → rack & pinion → 4:1 → worm gear</td><td>Torque → linear → rotational → self-lock</td><td>12</td></tr>
    <tr><td>Reset</td><td>Reset bar → ratchets → clamps → pin drum → striker</td><td>Mechanical release → spring return</td><td>13</td></tr>
    <tr><td>Convergence</td><td>Sliders → V-notch pins → trigger bar → damper → clutch</td><td>Position → detent → AND logic → time delay → disengage</td><td>Continuous monitoring</td></tr>
    <tr><td>Predict</td><td>Output rods → comparison beam → Geneva → answer prism</td><td>Linear → tilt → 120° index → rotation</td><td>9-10 (PREDICT only)</td></tr>
  </table>`;

  panel.innerHTML = html;
}
