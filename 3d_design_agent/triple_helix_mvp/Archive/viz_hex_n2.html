<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>N=2 Hex Tier — 24 Triangular Shafts</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<script>
// N=2: 2 channels per tier, 3 walls per tier
// 3 tiers at 0°/120°/240°
// Shows: top view with colored walls + numbered triangle shafts

const N = 2;
const HEX_R = 250; // pixels, corner radius
const TIER_ANGLES = [0, 120, 240];
const COLORS = [
  [255, 60, 60],    // red - tier 1 (0°)
  [60, 200, 60],    // green - tier 2 (120°)
  [60, 140, 255],   // blue - tier 3 (240°)
];

let triangles = [];

function setup() {
  createCanvas(700, 750);
  triangles = findAllTriangles(width/2, 340, HEX_R, N);
  noLoop();
}

function draw() {
  background(25);
  let cx = width/2, cy = 340;

  // Title
  fill(255);
  noStroke();
  textAlign(CENTER, TOP);
  textSize(18);
  text("N=2 · Regular Hex · Top View", cx, 12);
  textSize(13);
  fill(180);
  text("3 tiers × 3 walls each = triangular grid · " + triangles.length + " shafts", cx, 36);

  // Legend
  textSize(12);
  textAlign(LEFT, CENTER);
  for (let i = 0; i < 3; i++) {
    let ly = 70 + i * 20;
    fill(COLORS[i][0], COLORS[i][1], COLORS[i][2]);
    rect(cx - 140, ly - 5, 14, 10);
    fill(200);
    text("Tier " + (i+1) + " walls (" + TIER_ANGLES[i] + "°)", cx - 120, ly);
  }

  // Draw hex outline
  stroke(220);
  strokeWeight(3);
  noFill();
  drawHex(cx, cy, HEX_R);

  // Fill triangles with light color
  noStroke();
  for (let i = 0; i < triangles.length; i++) {
    let t = triangles[i];
    fill(255, 255, 255, 25);
    beginShape();
    vertex(t.v[0].x, t.v[0].y);
    vertex(t.v[1].x, t.v[1].y);
    vertex(t.v[2].x, t.v[2].y);
    endShape(CLOSE);
  }

  // Draw channel walls for each tier
  for (let tier = 0; tier < 3; tier++) {
    let col = COLORS[tier];
    stroke(col[0], col[1], col[2], 220);
    strokeWeight(2.2);
    drawChannelWalls(cx, cy, HEX_R, N, TIER_ANGLES[tier]);
  }

  // Number each triangle shaft
  textAlign(CENTER, CENTER);
  textSize(11);
  noStroke();
  for (let i = 0; i < triangles.length; i++) {
    let t = triangles[i];
    // Dot
    fill(255, 255, 100, 200);
    ellipse(t.cx, t.cy, 22, 22);
    // Number
    fill(0);
    text(i + 1, t.cx, t.cy);
  }

  // Info at bottom
  fill(180);
  textSize(12);
  textAlign(CENTER, TOP);
  let y0 = cy + HEX_R + 25;
  text("Each yellow dot = 1 block = 1 triangular shaft", cx, y0);
  text("Each shaft needs: 3 cams (1/helix) + 3 sliders (1/tier) + 6 fixed pulleys (2/tier)", cx, y0 + 18);
  text("Per helix: " + triangles.length + " cam lobes with progressive twist", cx, y0 + 36);
  text("Total cams: " + (triangles.length * 3), cx, y0 + 54);

  // Per-tier breakdown
  fill(220);
  textSize(12);
  textAlign(LEFT, TOP);
  let bx = 30, by = y0 + 80;
  text("Per tier breakdown:", bx, by);
  textSize(11);
  fill(180);
  text("• 2 channels (gaps between 3 walls)", bx, by + 18);
  text("• " + triangles.length + " slider pulleys (1 per shaft, each moves independently)", bx, by + 34);
  text("• " + (triangles.length * 2) + " fixed redirect pulleys (2 per shaft: upper + lower)", bx, by + 50);
  text("• " + triangles.length + " sliders driven by " + triangles.length + " cam followers", bx, by + 66);
}

function drawHex(cx, cy, r) {
  beginShape();
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60); // flat-top hex
    vertex(cx + r * cos(a), cy + r * sin(a));
  }
  endShape(CLOSE);
}

function drawChannelWalls(cx, cy, r, n, angleDeg) {
  let a = radians(angleDeg);
  let wx = cos(a), wy = sin(a);       // wall direction
  let px = cos(a + PI/2), py = sin(a + PI/2); // perpendicular

  let ftf = r * cos(PI/6); // flat-to-flat half-distance

  for (let i = 0; i <= n; i++) {
    let t = -ftf + i * (2 * ftf / n);
    let mx = cx + px * t;
    let my = cy + py * t;
    let pts = clipLineToHex(mx, my, wx, wy, cx, cy, r);
    if (pts) {
      line(pts.x1, pts.y1, pts.x2, pts.y2);
    }
  }
}

function clipLineToHex(mx, my, dx, dy, cx, cy, r) {
  let tmin = -9999, tmax = 9999;
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    let nx = cos(a), ny = sin(a);
    let d = r * cos(PI / 6);
    let num = d - (nx * (mx - cx) + ny * (my - cy));
    let den = nx * dx + ny * dy;
    if (abs(den) < 0.0001) {
      if (num < 0) return null;
    } else {
      let t = num / den;
      if (den > 0) tmax = min(tmax, t);
      else tmin = max(tmin, t);
    }
  }
  if (tmin > tmax) return null;
  return { x1: mx + tmin * dx, y1: my + tmin * dy, x2: mx + tmax * dx, y2: my + tmax * dy };
}

// Find all triangular cells formed by 3 sets of N+1 walls in a hex
function findAllTriangles(cx, cy, r, n) {
  let ftf = r * cos(PI / 6);
  let d = 2 * ftf / n; // channel spacing

  // For each direction, compute wall line equations
  // Wall i in direction dir: perpDist = -ftf + i * d
  let dirs = [];
  for (let tier = 0; tier < 3; tier++) {
    let a = radians(TIER_ANGLES[tier]);
    dirs.push({
      px: cos(a + PI / 2), py: sin(a + PI / 2), // perpendicular direction
    });
  }

  // A triangle is formed by 3 pairs of adjacent walls (one pair per direction)
  // For direction k, we pick strip index s_k (0 to n-1) meaning between wall s_k and s_k+1
  // The triangle center is at the intersection of the 3 strip midlines

  let results = [];

  // For each combination of strips
  for (let s0 = 0; s0 < n; s0++) {
    for (let s1 = 0; s1 < n; s1++) {
      for (let s2 = 0; s2 < n; s2++) {
        // Two triangle orientations per cell
        for (let orient = 0; orient < 2; orient++) {
          // Strip midline perpendicular position
          let frac = orient === 0 ? 1/3 : 2/3;

          let p0 = -ftf + (s0 + frac) * d;
          let p1 = -ftf + (s1 + frac) * d;
          let p2 = -ftf + (s2 + frac) * d;

          // Solve for x, y from first two directions
          let det = dirs[0].px * dirs[1].py - dirs[0].py * dirs[1].px;
          if (abs(det) < 0.001) continue;

          let x = (p0 * dirs[1].py - p1 * dirs[0].py) / det;
          let y = (dirs[0].px * p1 - dirs[1].px * p0) / det;

          // Check third direction consistency
          let p2_check = dirs[2].px * x + dirs[2].py * y;
          if (abs(p2_check - p2) > d * 0.35) continue;

          let px = cx + x, py = cy + y;

          // Check inside hex
          if (!isInsideHex(px, py, cx, cy, r - 3)) continue;

          // Check not duplicate
          let dup = false;
          for (let t of results) {
            if (dist(t.cx, t.cy, px, py) < d * 0.15) { dup = true; break; }
          }
          if (dup) continue;

          // Compute triangle vertices (intersections of 3 wall pairs)
          let verts = getTriangleVertices(cx, cy, dirs, d, s0, s1, s2, orient, ftf);
          if (verts) {
            results.push({ cx: px, cy: py, v: verts });
          }
        }
      }
    }
  }

  return results;
}

function getTriangleVertices(cx, cy, dirs, d, s0, s1, s2, orient, ftf) {
  // Triangle vertices are intersections of pairs of walls
  // For orient=0 (upward): walls s0, s1, s2
  // For orient=1 (downward): walls s0+1, s1+1, s2+1
  let off = orient === 0 ? 0 : 1;
  let w0 = -ftf + (s0 + off) * d;
  let w1 = -ftf + (s1 + off) * d;
  let w2 = -ftf + (s2 + off) * d;

  // But for the opposite triangle, use the other wall
  // Actually: triangle formed by wall s0 from dir0, wall s1 from dir1, wall s2 from dir2
  // and the opposite: wall s0+1 from dir0, wall s1+1 from dir1, wall s2+1 from dir2
  // Let me just use the 3 walls for this triangle

  let walls;
  if (orient === 0) {
    walls = [
      -ftf + s0 * d,       // wall from dir 0
      -ftf + s1 * d,       // wall from dir 1
      -ftf + s2 * d        // wall from dir 2
    ];
  } else {
    walls = [
      -ftf + (s0 + 1) * d,
      -ftf + (s1 + 1) * d,
      -ftf + (s2 + 1) * d
    ];
  }

  // Intersection of wall from dir_i and dir_j
  let verts = [];
  let pairs = [[0,1],[1,2],[2,0]];
  for (let [i, j] of pairs) {
    let det = dirs[i].px * dirs[j].py - dirs[i].py * dirs[j].px;
    if (abs(det) < 0.001) return null;
    let x = (walls[i] * dirs[j].py - walls[j] * dirs[i].py) / det;
    let y = (dirs[i].px * walls[j] - dirs[j].px * walls[i]) / det;
    verts.push({ x: cx + x, y: cy + y });
  }
  return verts;
}

function isInsideHex(px, py, cx, cy, r) {
  let dx = px - cx, dy = py - cy;
  let ftf = r * cos(PI / 6);
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    if (cos(a) * dx + sin(a) * dy > ftf) return false;
  }
  return true;
}
</script>
</body>
</html>
