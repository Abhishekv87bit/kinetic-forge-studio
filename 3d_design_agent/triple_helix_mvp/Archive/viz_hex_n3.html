<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>N=3 Hex Tier — Numbered Triangular Shafts</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<script>
// ============================================================
// Directly adapted from viz_hex_options.html (which WORKS)
// Just focused on N=3 with bigger hex and numbered shafts.
// ============================================================

const N = 3;
const HEX_R = 250;
const TIER_ANGLES = [0, 120, 240];
const COLORS = [
  [255, 60, 60],
  [60, 200, 60],
  [60, 140, 255],
];

let shafts = [];

function setup() {
  createCanvas(700, 820);
  shafts = findTriangleCenters(width/2, 370, HEX_R, N);
  noLoop();
}

function draw() {
  background(25);
  let cx = width/2, cy = 370;

  // Title
  fill(255); noStroke();
  textAlign(CENTER, TOP);
  textSize(18);
  text("N=3 · " + shafts.length + " Triangular Shafts", cx, 12);
  textSize(13);
  fill(180);
  text("4 walls/tier × 3 tiers · 3 channels/tier · 3 cams/helix · 9 total", cx, 36);

  // Legend
  textSize(12);
  textAlign(LEFT, CENTER);
  for (let i = 0; i < 3; i++) {
    let ly = 65 + i * 20;
    fill(COLORS[i][0], COLORS[i][1], COLORS[i][2]);
    rect(cx - 160, ly - 5, 14, 10);
    fill(200);
    text("Tier " + (i+1) + " walls (" + TIER_ANGLES[i] + "°)", cx - 140, ly);
  }

  // Hex outline
  stroke(220); strokeWeight(2.5); noFill();
  drawHex(cx, cy, HEX_R);

  // Channel walls per tier
  for (let tier = 0; tier < 3; tier++) {
    let col = COLORS[tier];
    stroke(col[0], col[1], col[2], 200);
    strokeWeight(1.8);
    drawChannelWalls(cx, cy, HEX_R, N, TIER_ANGLES[tier]);
  }

  // Numbered shafts
  textAlign(CENTER, CENTER);
  noStroke();
  for (let i = 0; i < shafts.length; i++) {
    let s = shafts[i];
    fill(255, 255, 100, 220);
    ellipse(s.x, s.y, 22, 22);
    fill(0);
    textSize(shafts.length > 40 ? 8 : 10);
    text(i + 1, s.x, s.y);
  }

  // Info
  fill(180); textSize(12);
  textAlign(CENTER, TOP);
  let y0 = cy + HEX_R + 20;
  text("Each yellow dot = 1 block = 1 triangular shaft", cx, y0);
  text("3 cams/helix × 3 helices = 9 cams total", cx, y0 + 18);
  text("3 slider strips/tier × 3 tiers = 9 slider strips total", cx, y0 + 36);

  // Per-channel count
  fill(220); textSize(12);
  textAlign(LEFT, TOP);
  let bx = 30, by = y0 + 60;
  text("Per-channel shaft count (Tier 1 @ 0°):", bx, by);
  let ftf = HEX_R * cos(PI/6);
  let d_ch = 2 * ftf / N;
  let a0 = radians(TIER_ANGLES[0]);
  let px0 = cos(a0 + PI/2), py0 = sin(a0 + PI/2);

  for (let ch = 0; ch < N; ch++) {
    let wallLo = -ftf + ch * d_ch;
    let wallHi = -ftf + (ch+1) * d_ch;
    let count = 0;
    for (let s of shafts) {
      let proj = px0 * (s.x - cx) + py0 * (s.y - cy);
      if (proj > wallLo + 2 && proj < wallHi - 2) count++;
    }
    fill(180); textSize(11);
    text("  CH" + ch + ": " + count + " shafts", bx, by + 18 + ch * 16);
  }
  fill(255, 255, 100); textSize(11);
  text("  Total: " + shafts.length, bx, by + 18 + N * 16 + 4);
}

// ============================================================
// COPY-PASTED from viz_hex_options.html (proven working)
// ============================================================

function drawHex(cx, cy, r) {
  beginShape();
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    vertex(cx + r * cos(a), cy + r * sin(a));
  }
  endShape(CLOSE);
}

function drawChannelWalls(cx, cy, r, n, angleDeg) {
  let a = radians(angleDeg);
  let wx = cos(a), wy = sin(a);
  let px = cos(a + PI/2), py = sin(a + PI/2);
  let ftf = r * cos(PI/6);

  for (let i = 0; i <= n; i++) {
    let t = -ftf + i * (2 * ftf / n);
    let mx = cx + px * t;
    let my = cy + py * t;
    let pts = clipLineToHex(mx, my, wx, wy, cx, cy, r);
    if (pts) {
      line(pts.x1, pts.y1, pts.x2, pts.y2);
    }
  }
}

function clipLineToHex(mx, my, dx, dy, cx, cy, r) {
  let tmin = -9999, tmax = 9999;
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    let nx = cos(a), ny = sin(a);
    let d = r * cos(PI / 6);
    let num = d - (nx * (mx - cx) + ny * (my - cy));
    let den = nx * dx + ny * dy;
    if (abs(den) < 0.0001) {
      if (num < 0) return null;
    } else {
      let t = num / den;
      if (den > 0) tmax = min(tmax, t);
      else tmin = max(tmin, t);
    }
  }
  if (tmin > tmax) return null;
  return { x1: mx + tmin * dx, y1: my + tmin * dy, x2: mx + tmax * dx, y2: my + tmax * dy };
}

// Triangle center finder — EXACT copy from viz_hex_options.html
function findTriangleCenters(cx, cy, r, n) {
  let ftf = r * cos(PI / 6);
  let d = 2 * ftf / n;

  let centers = [];

  let dirs = [];
  for (let tier = 0; tier < 3; tier++) {
    let a = radians(TIER_ANGLES[tier]);
    dirs.push({
      px: cos(a + PI/2), py: sin(a + PI/2),
      wx: cos(a), wy: sin(a)
    });
  }

  for (let a = 0; a < n; a++) {
    for (let b = 0; b < n; b++) {
      for (let c = 0; c < n; c++) {
        for (let orient = 0; orient < 2; orient++) {
          let offset = orient === 0 ? 1/3 : 2/3;

          let ta = -ftf + (a + offset) * d;
          let tb = -ftf + (b + offset) * d;
          let tc = -ftf + (c + offset) * d;

          let d0 = dirs[0], d1 = dirs[1], d2 = dirs[2];
          let det = d0.px * d1.py - d0.py * d1.px;
          if (abs(det) < 0.001) continue;

          let x = (ta * d1.py - tb * d0.py) / det;
          let y = (d0.px * tb - d1.px * ta) / det;

          let tc_check = d2.px * x + d2.py * y;
          if (abs(tc_check - tc) > d * 0.4) continue;

          let px = cx + x;
          let py = cy + y;

          if (!isInsideHex(px, py, cx, cy, r - 2)) continue;

          let dup = false;
          for (let s of centers) {
            if (dist(s.x, s.y, px, py) < d * 0.2) { dup = true; break; }
          }
          if (!dup) centers.push({x: px, y: py});
        }
      }
    }
  }

  return centers;
}

function isInsideHex(px, py, cx, cy, r) {
  let dx = px - cx, dy = py - cy;
  let ftf = r * cos(PI / 6);
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    if (cos(a) * dx + sin(a) * dy > ftf) return false;
  }
  return true;
}
</script>
</body>
</html>
