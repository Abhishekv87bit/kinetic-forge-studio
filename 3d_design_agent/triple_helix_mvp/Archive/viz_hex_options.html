<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hex Tier Options — Top View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<script>
// Regular hex with N channels per tier, 3 tiers at 0/120/240
// Shows top view: channel walls as colored lines

const OPTIONS = [
  { n: 1, label: "N=1 · 6 shafts" },
  { n: 2, label: "N=2 · 24 shafts" },
  { n: 3, label: "N=3 · 54 shafts" },
];

const COLORS = [
  [255, 60, 60],    // red - tier 1 (0°)
  [60, 220, 60],    // green - tier 2 (120°)
  [60, 140, 255],   // blue - tier 3 (240°)
];

const HEX_R = 130; // hex corner radius (pixels)
const TIER_ANGLES = [0, 120, 240];

function setup() {
  createCanvas(1000, 380);
  noLoop();
}

function draw() {
  background(30);

  fill(255);
  noStroke();
  textAlign(CENTER, TOP);
  textSize(16);
  text("Hex Tier Options — Top View (3 tiers at 0°/120°/240°)", width/2, 10);

  for (let opt = 0; opt < OPTIONS.length; opt++) {
    let cx = 170 + opt * 330;
    let cy = 200;
    let n = OPTIONS[opt].n;

    // Label
    fill(255);
    textSize(14);
    textAlign(CENTER, BOTTOM);
    text(OPTIONS[opt].label, cx, cy - HEX_R - 15);
    textSize(11);
    text((n) + " channel" + (n > 1 ? "s" : "") + "/tier · " + (n + 1) + " walls/tier", cx, cy - HEX_R - 2);

    // Draw hex outline
    stroke(200);
    strokeWeight(2.5);
    noFill();
    drawHex(cx, cy, HEX_R);

    // Draw channel walls for each tier
    for (let tier = 0; tier < 3; tier++) {
      let angle = TIER_ANGLES[tier];
      let col = COLORS[tier];
      stroke(col[0], col[1], col[2], 200);
      strokeWeight(1.8);
      drawChannelWalls(cx, cy, HEX_R, n, angle);
    }

    // Mark triangle centers (shaft positions) as dots
    let shafts = findTriangleCenters(cx, cy, HEX_R, n);
    noStroke();
    fill(255, 255, 255, 180);
    for (let s of shafts) {
      ellipse(s.x, s.y, 5, 5);
    }

    // Count label
    fill(255, 255, 100);
    textSize(12);
    textAlign(CENTER, TOP);
    text(shafts.length + " shaft positions", cx, cy + HEX_R + 8);
  }
}

function drawHex(cx, cy, r) {
  beginShape();
  for (let i = 0; i < 6; i++) {
    // Flat top hex: first vertex at 30°
    let a = radians(30 + i * 60);
    vertex(cx + r * cos(a), cy + r * sin(a));
  }
  endShape(CLOSE);
}

// Draw N+1 equally spaced parallel walls across the hex at given angle
function drawChannelWalls(cx, cy, r, n, angleDeg) {
  let a = radians(angleDeg);
  // Wall direction: perpendicular to the channel "gap" direction
  // Walls run parallel to one hex edge
  // For angle=0: walls are vertical (channels are horizontal gaps)
  // Actually: walls run along angleDeg direction, channels perpendicular

  // Direction along wall
  let wx = cos(a);
  let wy = sin(a);
  // Direction perpendicular to wall (channel stacking direction)
  let px = cos(a + PI/2);
  let py = sin(a + PI/2);

  // Flat-to-flat distance in the perpendicular direction
  let ftf = r * cos(PI/6); // = r * sqrt(3)/2

  // N+1 walls evenly spanning from -ftf to +ftf
  for (let i = 0; i <= n; i++) {
    let t = -ftf + i * (2 * ftf / n);
    // Wall center point
    let mx = cx + px * t;
    let my = cy + py * t;

    // Clip wall line to hex boundary
    let pts = clipLineToHex(mx, my, wx, wy, cx, cy, r);
    if (pts) {
      line(pts.x1, pts.y1, pts.x2, pts.y2);
    }
  }
}

// Clip an infinite line through (mx,my) with direction (dx,dy) to hex boundary
function clipLineToHex(mx, my, dx, dy, cx, cy, r) {
  let tmin = -9999, tmax = 9999;

  // Hex edges: 6 edges defined by normals
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    // Normal pointing outward
    let nx = cos(a);
    let ny = sin(a);
    // Half-distance from center to edge
    let d = r * cos(PI/6); // flat-to-flat / 2

    // Point on line: (mx + t*dx, my + t*dy)
    // Constraint: nx*(px-cx) + ny*(py-cy) <= d
    let num = d - (nx * (mx - cx) + ny * (my - cy));
    let den = nx * dx + ny * dy;

    if (abs(den) < 0.0001) {
      if (num < 0) return null; // parallel and outside
    } else {
      let t = num / den;
      if (den > 0) {
        tmax = min(tmax, t);
      } else {
        tmin = max(tmin, t);
      }
    }
  }

  if (tmin > tmax) return null;

  return {
    x1: mx + tmin * dx, y1: my + tmin * dy,
    x2: mx + tmax * dx, y2: my + tmax * dy
  };
}

// Find centers of triangular cells formed by the 3 sets of walls
function findTriangleCenters(cx, cy, r, n) {
  // Sample a grid of points and check which are inside the hex
  // A point is a valid shaft if it's inside the hex
  // The triangle centers are at intersections of the 3 wall grids

  let ftf = r * cos(PI/6);
  let d = 2 * ftf / n; // channel spacing

  let centers = [];
  // For each combination of wall indices from 3 directions,
  // find the triangle center

  let dirs = [];
  for (let tier = 0; tier < 3; tier++) {
    let a = radians(TIER_ANGLES[tier]);
    dirs.push({
      px: cos(a + PI/2), py: sin(a + PI/2), // perpendicular (stacking) direction
      wx: cos(a), wy: sin(a) // wall direction
    });
  }

  // Each triangle is defined by being between walls i and i+1 in each of 3 directions
  // Wall positions in perpendicular direction: -ftf + k * d for k = 0..n
  // Channel center positions: -ftf + (k + 0.5) * d for k = 0..n-1

  for (let a = 0; a < n; a++) {
    for (let b = 0; b < n; b++) {
      for (let c = 0; c < n; c++) {
        // For both triangle orientations (center shifted +1/3 and -1/3)
        for (let orient = 0; orient < 2; orient++) {
          let offset = orient === 0 ? 1/3 : 2/3;

          // Position in each perpendicular direction
          let ta = -ftf + (a + offset) * d;
          let tb = -ftf + (b + offset) * d;
          let tc = -ftf + (c + offset) * d;

          // Convert to x,y: solve the system
          // dirs[0].px * x + dirs[0].py * y = ta
          // dirs[1].px * x + dirs[1].py * y = tb
          let d0 = dirs[0], d1 = dirs[1], d2 = dirs[2];
          let det = d0.px * d1.py - d0.py * d1.px;
          if (abs(det) < 0.001) continue;

          let x = (ta * d1.py - tb * d0.py) / det;
          let y = (d0.px * tb - d1.px * ta) / det;

          // Check third constraint
          let tc_check = d2.px * x + d2.py * y;
          if (abs(tc_check - tc) > d * 0.4) continue;

          // Check inside hex
          let px = cx + x;
          let py = cy + y;
          if (isInsideHex(px, py, cx, cy, r - 2)) {
            // Check not duplicate
            let dup = false;
            for (let s of centers) {
              if (dist(s.x, s.y, px, py) < d * 0.2) { dup = true; break; }
            }
            if (!dup) centers.push({x: px, y: py});
          }
        }
      }
    }
  }

  return centers;
}

function isInsideHex(px, py, cx, cy, r) {
  let dx = px - cx, dy = py - cy;
  let ftf = r * cos(PI/6);
  for (let i = 0; i < 6; i++) {
    let a = radians(30 + i * 60);
    if (cos(a) * dx + sin(a) * dy > ftf) return false;
  }
  return true;
}
</script>
</body>
</html>
