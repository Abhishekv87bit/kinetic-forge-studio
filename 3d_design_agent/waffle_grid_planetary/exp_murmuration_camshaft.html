<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Murmuration Cam-Shaft Prototype — 64 Birds, 4 Shafts</title>
<style>
  body { margin: 0; background: #0a0812; overflow: hidden; font-family: monospace; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(10,8,18,0.92); padding: 12px 16px; border-radius: 8px;
    color: #aaa; font-size: 11px; line-height: 1.7; pointer-events: none;
  }
  #hud .title { color: #f0c860; font-size: 13px; font-weight: bold; letter-spacing: 1px; }
  #hud .val { color: #eee; }
  #hud .dim { color: #555; }
  #panel {
    position: fixed; top: 10px; right: 10px; z-index: 10; width: 260px;
    max-height: calc(100vh - 20px); overflow-y: auto;
    background: rgba(10,8,18,0.92); padding: 14px; border-radius: 8px;
    color: #ccc; font-size: 11px; line-height: 1.6;
  }
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  #panel h3 { margin: 0 0 6px 0; color: #f0c860; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  #panel label { display: block; margin: 3px 0 1px; color: #777; font-size: 10px; }
  #panel input[type=range] { width: 100%; accent-color: #d4a44a; }
  #panel .sv { float: right; color: #f0c860; font-size: 10px; }
  #panel hr { border: none; border-top: 1px solid #333; margin: 8px 0; }
  .btn {
    display: inline-block; padding: 4px 10px; margin: 2px;
    background: #1a1628; border: 1px solid #444; border-radius: 4px;
    color: #aaa; cursor: pointer; font-size: 10px; font-family: monospace;
  }
  .btn.active { background: #2a1a10; border-color: #d4a44a; color: #f0c860; }
  .btn:hover { background: #2a2438; }
  #explainer {
    position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 10;
    background: rgba(10,8,18,0.92); padding: 8px 16px; border-radius: 8px;
    color: #555; font-size: 10px; text-align: center; line-height: 1.5;
  }
  #explainer b { color: #bbb; }
  #explainer .k { color: #f0c860; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ==================================================================
// CAM-SHAFT MURMURATION PROTOTYPE SIMULATOR
//
// Simulates the exact mechanism:
//   4 shafts at irrational speed ratios
//   8 cams per shaft with phase offsets
//   64 birds (8×8) on cable intersections
//   cam_profile(θ) = Σ Ak·sin(k·θ + φk) — Fourier cam
//
// PURPOSE: Preview the physical prototype's motion before
//          3D printing. Tune cam profiles until it looks alive.
// ==================================================================

const COLS = 8, ROWS = 8;
const N_BIRDS = COLS * ROWS;
const GRID_PITCH = 40;  // mm — matches prototype
const FRAME_W = (COLS - 1) * GRID_PITCH;
const FRAME_H = (ROWS - 1) * GRID_PITCH;
const CABLE_LEN = 250;  // mm cable drop

// --- Shaft speeds (irrational ratios × base RPM) ---
let baseSpeed = 1.0;  // RPM
const SHAFT_RATIO = [1.0, Math.SQRT2, Math.PI / 2, (1 + Math.sqrt(5)) / 2];
const SHAFT_NAMES = ['A (1.00×)', 'B (√2×)', 'C (π/2×)', 'D (φ×)'];
// Shafts A,C = X-direction; Shafts B,D = Y-direction
const SHAFT_AXIS = [0, 1, 0, 1]; // 0=X, 1=Y

// --- Phase offsets per cam (degrees, tunable) ---
let phaseSpread = [45, 50, 30, 55]; // degrees between consecutive cams

// --- Cam profile harmonics ---
// cam(θ) = A1·sin(θ+φ) + A2·sin(2θ+φ) + A3·sin(3θ+φ)
let camAmp1 = 5.0;   // mm — fundamental (main wave)
let camAmp2 = 2.0;   // mm — 2nd harmonic (asymmetry)
let camAmp3 = 1.0;   // mm — 3rd harmonic (snap/dwell)

// --- Display ---
let showFrame = true;
let showCables = true;
let showShafts = true;
let birdSize = 1.0;
let viewAngle = 'iso'; // 'iso', 'below', 'side', 'front'

// --- Camera ---
let camDist = 600;
let camRX = -0.5, camRY = 0.3;
let dragging = false, lastMX, lastMY;
let autoRotate = false;

// --- State ---
let paused = false;
let simTime = 0;
let birds = [];

function camProfile(shaftIdx, camIdx, t) {
  // Returns displacement in mm for one cam at time t
  let omega = baseSpeed * SHAFT_RATIO[shaftIdx] * TWO_PI / 60; // rad/s
  let phase = camIdx * phaseSpread[shaftIdx] * PI / 180;
  let theta = omega * t + phase;

  return camAmp1 * Math.sin(theta)
       + camAmp2 * Math.sin(2 * theta + 0.3)
       + camAmp3 * Math.sin(3 * theta + 0.7);
}

function initBirds() {
  birds = [];
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      birds.push({
        col: col, row: row,
        // Rest position (center of grid = origin)
        restX: (col - (COLS - 1) / 2) * GRID_PITCH,
        restY: (row - (ROWS - 1) / 2) * GRID_PITCH,
        // Current position
        x: 0, y: 0, z: 0,
        // Velocity (for rendering direction)
        vx: 0, vy: 0, vz: 0,
        trail: []
      });
    }
  }
}

function updateBirds() {
  let dt = 1 / 60;
  simTime += dt;

  for (let b of birds) {
    let prevX = b.x, prevY = b.y, prevZ = b.z;

    // X displacement = Shaft A (col cam) + Shaft C (col cam)
    let dx = camProfile(0, b.col, simTime) + camProfile(2, b.col, simTime);
    // Y displacement = Shaft B (row cam) + Shaft D (row cam)
    let dy = camProfile(1, b.row, simTime) + camProfile(3, b.row, simTime);

    b.x = b.restX + dx;
    b.y = b.restY + dy;

    // Z from cable geometry: cable goes diagonal, bird drops when displaced
    let lateralDist = Math.sqrt(dx * dx + dy * dy);
    b.z = -CABLE_LEN + lateralDist * lateralDist / (2 * CABLE_LEN); // parabolic approx

    b.vx = b.x - prevX;
    b.vy = b.y - prevY;
    b.vz = b.z - prevZ;

    // Trail
    b.trail.push({ x: b.x, y: b.y, z: b.z });
    if (b.trail.length > 60) b.trail.shift();
  }
}

// =========================
// RENDERING
// =========================
function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  initBirds();
  buildUI();
}

function draw() {
  background(10, 8, 18);

  // Camera
  if (autoRotate && !dragging) camRY += 0.0015;

  let ex, ey, ez;
  if (viewAngle === 'below') {
    ex = 0; ey = -camDist; ez = 20;
    camera(ex, ey, ez, 0, -CABLE_LEN / 2, 0, 0, 0, -1);
  } else if (viewAngle === 'side') {
    ex = camDist; ey = -CABLE_LEN / 2; ez = 0;
    camera(ex, ey, ez, 0, -CABLE_LEN / 2, 0, 0, -1, 0);
  } else if (viewAngle === 'front') {
    ex = 0; ey = -CABLE_LEN / 2; ez = camDist;
    camera(ex, ey, ez, 0, -CABLE_LEN / 2, 0, 0, -1, 0);
  } else {
    ex = camDist * Math.cos(camRX) * Math.sin(camRY);
    ey = camDist * Math.sin(camRX);
    ez = camDist * Math.cos(camRX) * Math.cos(camRY);
    camera(ex, ey, ez, 0, -CABLE_LEN / 2, 0, 0, -1, 0);
  }

  ambientLight(90);
  directionalLight(200, 190, 160, 0.3, 0.8, -0.5);
  directionalLight(50, 60, 90, -0.5, -0.3, 0.6);

  if (!paused) updateBirds();

  // --- Draw frame plate (top) ---
  if (showFrame) {
    push();
    translate(0, 0, 0);
    fill(40, 35, 30, 150);
    noStroke();
    box(FRAME_W + 40, 8, FRAME_H + 40);

    // Grid holes
    stroke(60, 55, 45);
    strokeWeight(1);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        let gx = (c - (COLS - 1) / 2) * GRID_PITCH;
        let gz = (r - (ROWS - 1) / 2) * GRID_PITCH;
        push();
        translate(gx, -5, gz);
        fill(20, 18, 15);
        noStroke();
        cylinder(2, 10, 6);
        pop();
      }
    }
    pop();
  }

  // --- Draw shafts ---
  if (showShafts) {
    let shaftColors = [[180, 80, 80], [80, 140, 180], [180, 140, 80], [80, 180, 120]];
    for (let s = 0; s < 4; s++) {
      push();
      let sc = shaftColors[s];
      stroke(sc[0], sc[1], sc[2], 120);
      strokeWeight(2);
      noFill();

      let axis = SHAFT_AXIS[s];
      let offset = (s < 2) ? -10 : 10; // pair offset

      if (axis === 0) {
        // X-direction shaft
        let z = offset;
        line(-(FRAME_W / 2 + 20), 4, z, (FRAME_W / 2 + 20), 4, z);
      } else {
        // Y-direction shaft
        let x = offset;
        line(x, 4, -(FRAME_H / 2 + 20), x, 4, (FRAME_H / 2 + 20));
      }
      pop();

      // Draw cam discs on shaft
      let omega = baseSpeed * SHAFT_RATIO[s] * TWO_PI / 60;
      let nCams = (axis === 0) ? COLS : ROWS;
      for (let ci = 0; ci < nCams; ci++) {
        let phase = ci * phaseSpread[s] * PI / 180;
        let angle = omega * simTime + phase;

        push();
        let px, pz;
        if (axis === 0) {
          px = (ci - (COLS - 1) / 2) * GRID_PITCH;
          pz = offset;
        } else {
          px = offset;
          pz = (ci - (ROWS - 1) / 2) * GRID_PITCH;
        }
        translate(px, 4, pz);

        if (axis === 0) rotateZ(0); else rotateX(0);

        // Cam disc
        fill(sc[0], sc[1], sc[2], 60);
        stroke(sc[0], sc[1], sc[2], 100);
        strokeWeight(0.5);
        ellipse(0, 0, 20, 20);

        // Eccentric pin position
        let pinX = 5 * Math.cos(angle);
        let pinY = 5 * Math.sin(angle);
        fill(sc[0], sc[1], sc[2], 200);
        noStroke();
        ellipse(pinX, pinY, 3, 3);
        pop();
      }
    }
  }

  // --- Compute flock stats ---
  let maxSpd = 0;
  for (let b of birds) {
    let spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy + b.vz * b.vz);
    if (spd > maxSpd) maxSpd = spd;
  }

  // --- Draw cables + birds ---
  for (let i = 0; i < N_BIRDS; i++) {
    let b = birds[i];
    let spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy + b.vz * b.vz);

    // Color by speed
    let t = constrain(spd / (maxSpd + 0.01), 0, 1);
    let cr = lerp(200, 255, t);
    let cg = lerp(150, 240, t);
    let cb = lerp(80, 200, t);

    // Cable
    if (showCables) {
      push();
      stroke(60, 55, 45, 80);
      strokeWeight(0.5);
      // Cable from frame hole to bird
      line(b.restX, -4, b.restY, b.x, b.z, b.y);
      pop();
    }

    // Trail
    if (b.trail.length > 2) {
      push();
      noFill();
      strokeWeight(0.5);
      beginShape();
      for (let k = 0; k < b.trail.length; k++) {
        let a = (k / b.trail.length) * 60;
        stroke(cr, cg, cb, a);
        let tp = b.trail[k];
        vertex(tp.x, tp.z, tp.y);
      }
      endShape();
      pop();
    }

    // Bird
    push();
    translate(b.x, b.z, b.y);

    // Orient along velocity
    let speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy + b.vz * b.vz);
    if (speed > 0.01) {
      // velocity in render coords: (vx, vz, vy)
      let dir = createVector(b.vx, b.vz, b.vy).normalize();
      let up = createVector(0, -1, 0);
      let right = p5.Vector.cross(dir, up).normalize();
      if (right.mag() < 0.001) {
        up = createVector(1, 0, 0);
        right = p5.Vector.cross(dir, up).normalize();
      }
      let realUp = p5.Vector.cross(right, dir).normalize();
      applyMatrix(
        dir.x, dir.y, dir.z, 0,
        realUp.x, realUp.y, realUp.z, 0,
        right.x, right.y, right.z, 0,
        0, 0, 0, 1
      );
    }

    let sz = 4 * birdSize;
    fill(cr, cg, cb, 230);
    noStroke();
    beginShape(TRIANGLES);
    vertex(sz * 2.5, 0, 0);
    vertex(-sz, sz * 0.7, 0);
    vertex(-sz, -sz * 0.7, 0);
    vertex(sz * 2.5, 0, 0);
    vertex(-sz, 0, sz * 0.9);
    vertex(-sz, sz * 0.7, 0);
    vertex(sz * 2.5, 0, 0);
    vertex(-sz, -sz * 0.7, 0);
    vertex(-sz, 0, sz * 0.9);
    vertex(-sz, sz * 0.7, 0);
    vertex(-sz, -sz * 0.7, 0);
    vertex(-sz, 0, sz * 0.9);
    endShape();
    pop();
  }

  updateHUD(maxSpd);
}

// =========================
// HUD
// =========================
function updateHUD(maxSpd) {
  let h = document.getElementById('hud');
  h.innerHTML = `
    <div class="title">CAM-SHAFT PROTOTYPE</div>
    <div style="color:#666;margin:2px 0 6px">8×8 grid · 4 shafts · 64 birds</div>
    <div>Grid: <span class="val">${COLS}×${ROWS}</span> at <span class="val">${GRID_PITCH}mm</span> pitch</div>
    <div>Frame: <span class="val">${FRAME_W}×${FRAME_H}mm</span></div>
    <div>Cable drop: <span class="val">${CABLE_LEN}mm</span></div>
    <div>Travel: <span class="val">±${(camAmp1 + camAmp2 + camAmp3).toFixed(0)}mm</span> max</div>
    <div style="margin-top:4px">Shaft speeds: <span class="val">${SHAFT_RATIO.map((r,i) => r.toFixed(2)+'×').join(' ')}</span></div>
    <div>Max speed: <span class="val">${maxSpd.toFixed(1)}</span> mm/frame</div>
    <div>FPS: <span class="val">${Math.round(frameRate())}</span></div>
  `;
}

// =========================
// UI
// =========================
function buildUI() {
  let p = document.getElementById('panel');
  p.innerHTML = `
    <h3>View</h3>
    <button class="btn active" id="viso" onclick="setView('iso')">Isometric</button>
    <button class="btn" id="vbelow" onclick="setView('below')">From Below</button>
    <button class="btn" id="vside" onclick="setView('side')">Side</button>
    <button class="btn" id="vfront" onclick="setView('front')">Front</button>
    <hr>
    <h3>Cam Profile (Fourier)</h3>
    <label>1st Harmonic (flow) <span class="sv" id="sv-a1">${camAmp1}</span>mm</label>
    <input type="range" min="0" max="12" value="${camAmp1}" step="0.5"
      oninput="camAmp1=+this.value;document.getElementById('sv-a1').textContent=this.value">
    <label>2nd Harmonic (asymmetry) <span class="sv" id="sv-a2">${camAmp2}</span>mm</label>
    <input type="range" min="0" max="6" value="${camAmp2}" step="0.5"
      oninput="camAmp2=+this.value;document.getElementById('sv-a2').textContent=this.value">
    <label>3rd Harmonic (snap) <span class="sv" id="sv-a3">${camAmp3}</span>mm</label>
    <input type="range" min="0" max="4" value="${camAmp3}" step="0.5"
      oninput="camAmp3=+this.value;document.getElementById('sv-a3').textContent=this.value">
    <hr>
    <h3>Phase Offsets (per shaft)</h3>
    <label>Shaft A phase spread <span class="sv" id="sv-p0">${phaseSpread[0]}°</span></label>
    <input type="range" min="10" max="90" value="${phaseSpread[0]}" step="5"
      oninput="phaseSpread[0]=+this.value;document.getElementById('sv-p0').textContent=this.value+'°'">
    <label>Shaft B phase spread <span class="sv" id="sv-p1">${phaseSpread[1]}°</span></label>
    <input type="range" min="10" max="90" value="${phaseSpread[1]}" step="5"
      oninput="phaseSpread[1]=+this.value;document.getElementById('sv-p1').textContent=this.value+'°'">
    <label>Shaft C phase spread <span class="sv" id="sv-p2">${phaseSpread[2]}°</span></label>
    <input type="range" min="10" max="90" value="${phaseSpread[2]}" step="5"
      oninput="phaseSpread[2]=+this.value;document.getElementById('sv-p2').textContent=this.value+'°'">
    <label>Shaft D phase spread <span class="sv" id="sv-p3">${phaseSpread[3]}°</span></label>
    <input type="range" min="10" max="90" value="${phaseSpread[3]}" step="5"
      oninput="phaseSpread[3]=+this.value;document.getElementById('sv-p3').textContent=this.value+'°'">
    <hr>
    <h3>Speed</h3>
    <label>Base RPM <span class="sv" id="sv-rpm">${baseSpeed}</span></label>
    <input type="range" min="0.2" max="5" value="${baseSpeed}" step="0.1"
      oninput="baseSpeed=+this.value;document.getElementById('sv-rpm').textContent=this.value">
    <hr>
    <h3>Display</h3>
    <button class="btn ${showFrame ? 'active' : ''}" onclick="showFrame=!showFrame;this.classList.toggle('active')">Frame</button>
    <button class="btn ${showCables ? 'active' : ''}" onclick="showCables=!showCables;this.classList.toggle('active')">Cables</button>
    <button class="btn ${showShafts ? 'active' : ''}" onclick="showShafts=!showShafts;this.classList.toggle('active')">Shafts</button>
    <button class="btn ${autoRotate ? 'active' : ''}" id="btn-ar" onclick="autoRotate=!autoRotate;this.classList.toggle('active')">Auto-rotate</button>
    <label>Bird Size <span class="sv" id="sv-bs">${birdSize.toFixed(1)}</span></label>
    <input type="range" min="3" max="30" value="${birdSize*10}" step="1"
      oninput="birdSize=this.value/10;document.getElementById('sv-bs').textContent=(this.value/10).toFixed(1)">
    <hr>
    <h3>Presets</h3>
    <button class="btn" onclick="presetSmooth()">Smooth Wave</button>
    <button class="btn" onclick="presetSnappy()">Snappy Turns</button>
    <button class="btn" onclick="presetChaotic()">Quasi-Chaotic</button>
    <button class="btn" onclick="presetMurmuration()">Best Murmuration</button>
  `;
}

function setView(v) {
  viewAngle = v;
  document.querySelectorAll('#panel .btn').forEach(b => {
    if (['viso','vbelow','vside','vfront'].includes(b.id)) b.classList.remove('active');
  });
  let el = document.getElementById('v' + v);
  if (el) el.classList.add('active');
}

// --- Presets ---
function presetSmooth() {
  camAmp1 = 5; camAmp2 = 0; camAmp3 = 0;
  phaseSpread = [45, 50, 30, 55];
  baseSpeed = 1.0;
  refreshSliders();
}
function presetSnappy() {
  camAmp1 = 4; camAmp2 = 3; camAmp3 = 2;
  phaseSpread = [40, 60, 25, 70];
  baseSpeed = 1.5;
  refreshSliders();
}
function presetChaotic() {
  camAmp1 = 6; camAmp2 = 2.5; camAmp3 = 1.5;
  phaseSpread = [73, 37, 61, 47]; // prime-ish spreads
  baseSpeed = 2.0;
  refreshSliders();
}
function presetMurmuration() {
  camAmp1 = 5; camAmp2 = 2; camAmp3 = 1;
  phaseSpread = [45, 55, 30, 65];
  baseSpeed = 1.2;
  refreshSliders();
}

function refreshSliders() {
  // Rebuild UI to reflect new values
  buildUI();
}

// =========================
// CAMERA
// =========================
function mousePressed() {
  if (mouseX > width - 280) return;
  if (mouseX < 260 && mouseY < 250) return;
  dragging = true;
  lastMX = mouseX; lastMY = mouseY;
}
function mouseReleased() { dragging = false; }
function mouseDragged() {
  if (!dragging) return;
  camRY += (mouseX - lastMX) * 0.005;
  camRX += (mouseY - lastMY) * 0.005;
  camRX = constrain(camRX, -HALF_PI + 0.1, HALF_PI - 0.1);
  lastMX = mouseX; lastMY = mouseY;
  viewAngle = 'iso'; // switch back to free orbit
}
function mouseWheel(e) {
  camDist += e.delta * 0.5;
  camDist = constrain(camDist, 200, 1200);
  return false;
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); }

function keyPressed() {
  if (key === ' ') { paused = !paused; return false; }
  if (key === '1') setView('iso');
  if (key === '2') setView('below');
  if (key === '3') setView('side');
  if (key === '4') setView('front');
  if (key === 'f' || key === 'F') { showFrame = !showFrame; }
  if (key === 'c' || key === 'C') { showCables = !showCables; }
  if (key === 'r' || key === 'R') { autoRotate = !autoRotate; }
}
</script>
</head>
<body>
<div id="hud"></div>
<div id="panel"></div>
<div id="explainer">
  <b>CAM-SHAFT PROTOTYPE</b> — 8×8 grid, 4 shafts at irrational speed ratios, Fourier cam profiles
  <br><span class="k">1-4</span> views &middot; <span class="k">Space</span> pause &middot;
  <span class="k">F</span> frame &middot; <span class="k">C</span> cables &middot;
  <span class="k">R</span> rotate &middot; Drag orbit &middot; Scroll zoom
  <br>Tune harmonics + phase offsets to find your murmuration. Then 3D print exactly these cam profiles.
</div>
</body>
</html>
