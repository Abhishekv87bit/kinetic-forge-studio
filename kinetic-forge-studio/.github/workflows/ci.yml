# ══════════════════════════════════════════════════════════
# Production Pipeline Template: GitHub Actions CI/CD
# ══════════════════════════════════════════════════════════
# Placeholders:
#   3.12  - Python version (default: 3.12)
#   20    - Node version (default: 20)
#   backend     - Backend directory (default: backend)
#   frontend    - Frontend directory (default: frontend)
#   pytest    - Test command (default: pytest)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type Check ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/

  # ── Backend Tests ──
  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest
        env:
          TESTING: "true"

  # ── Frontend Build ──
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker Build (verify it compiles) ──
  docker:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

