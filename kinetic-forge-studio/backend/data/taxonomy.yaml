size_indicators:
  envelope_patterns:
    - pattern: '(\d+)\s*mm'
      field: envelope_mm
      description: Dimension in millimeters
    - pattern: '(\d+)\s*cm'
      field: envelope_cm
      multiplier: 10
      description: Dimension in centimeters
    - pattern: '(\d+)\s*inch'
      field: envelope_inch
      multiplier: 25.4
      description: Dimension in inches
  size_words:
    tiny:
      keywords:
        - tiny
        - miniature
        - micro
        - small
      estimated_envelope_mm: 30
    compact:
      keywords:
        - compact
        - pocket
        - desktop
      estimated_envelope_mm: 70
    medium:
      keywords:
        - medium
        - mid-size
        - moderate
      estimated_envelope_mm: 150
    large:
      keywords:
        - large
        - big
        - floor
        - table
      estimated_envelope_mm: 300
    monumental:
      keywords:
        - monumental
        - huge
        - wall
        - installation
      estimated_envelope_mm: 1000

numerical_parameters:
  planet_count:
    patterns:
      - '(\d+)\s*planets?'
      - '(\d+)\s*planet gears?'
    description: Number of planet gears
  teeth:
    patterns:
      - '(\d+)\s*teeth'
      - '(\d+)T\b'
      - '(\d+)\s*tooth'
    description: Number of gear teeth
  gear_module:
    patterns:
      - 'module\s*(\d+(?:\.\d+)?)'
      - 'mod\s*(\d+(?:\.\d+)?)'
    description: Gear module value
  motor_count:
    patterns:
      - '(\d+)\s*motors?'
    description: Number of motors
    special_words:
      single: 1
      dual: 2
      twin: 2
      triple: 3
  speed_rpm:
    patterns:
      - '(\d+)\s*rpm'
      - '(\d+)\s*RPM'
    description: Speed in RPM

