# Kinetic Forge Studio — Taxonomy for keyword classification
# Maps user-facing keywords to structured design fields.

mechanism_types:
  planetary:
    keywords:
      - planetary
      - epicyclic
      - sun gear
      - sun and planet
      - ring gear
      - planet gear
      - planets
    description: Planetary/epicyclic gear train
  four_bar:
    keywords:
      - four bar
      - four-bar
      - 4-bar
      - 4bar
      - crank rocker
      - grashof
      - coupler
    description: Four-bar linkage mechanism
  scotch_yoke:
    keywords:
      - scotch yoke
      - scotch-yoke
      - slider crank
      - slider-crank
      - reciprocating
    description: Scotch yoke or slider-crank
  wave:
    keywords:
      - wave
      - waves
      - undulating
      - ripple
      - ocean
      - sinusoidal
    description: Wave-based motion mechanism
  cam:
    keywords:
      - cam
      - cam follower
      - eccentric
      - lobe
      - profile cam
    description: Cam and follower mechanism
  geneva:
    keywords:
      - geneva
      - geneva drive
      - intermittent
      - maltese cross
      - indexing
    description: Geneva drive (intermittent motion)
  linkage:
    keywords:
      - linkage
      - mechanism
      - kinematic chain
      - multi-bar
      - parallel motion
    description: General linkage mechanism
  gear_train:
    keywords:
      - gear train
      - gear-train
      - reduction
      - gear ratio
      - compound gear
    description: Simple or compound gear train
  ratchet:
    keywords:
      - ratchet
      - pawl
      - one-way
      - anti-reverse
    description: Ratchet mechanism
  belt_drive:
    keywords:
      - belt
      - belt drive
      - pulley
      - timing belt
      - GT2
    description: Belt and pulley drive

